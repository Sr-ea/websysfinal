{% extends 'dashboard/base.html' %}
{% block title %}Delete Product{% endblock %}

{% block dashboard_content %}
<div style="max-width:500px;">
  <h1>Delete Product</h1>
  <div class="form-card">
    <p style="margin-bottom:8px;">Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>
    <p style="color:var(--gray-500);margin-bottom:20px;font-size:0.9rem;">This action cannot be undone.</p>

    <form method="post" style="display:flex;gap:8px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'dashboard:dashboard_products' %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
