{% extends 'dashboard/base.html' %}
{% block title %}Delete Category{% endblock %}

{% block dashboard_content %}
<div style="max-width:500px;">
  <h1>Delete Category</h1>
  <div style="background:var(--white);padding:24px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);">
    <p style="margin-bottom:8px;">Are you sure you want to delete category <strong>{{ category.name }}</strong>?</p>
    <p style="color:var(--gray-500);margin-bottom:20px;font-size:0.9rem;">Products in this category will not be deleted.</p>

    <form method="post" style="display:flex;gap:8px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'dashboard:dashboard_categories' %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
