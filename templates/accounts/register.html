{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="form-page">
  <h1>Create Account</h1>
  <form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p class="form-footer">
    Already have an account? <a href="{% url 'login' %}">Login here</a>.
  </p>
</div>
{% endblock %}
